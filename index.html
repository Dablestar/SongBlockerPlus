<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SongBlocker+</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="title-row">
            <h1>SongBlocker+</h1>
            <button class="btn icon-btn" id="addBtn" title="Add current song to ban list">
                <img src="./src/icon_add.svg" alt="Add" width="32" height="32">
            </button>
        </div>
        <p id="currentTitle" class="source-info">—</p>
        <p id="statusMsg" class="status-msg"></p>
    </div>

    <div class="banlist-section">
        <div class="banlist-header">
            <span>Ban List</span>
            <span id="banCount" class="ban-count">0</span>
        </div>
        <div id="banListContainer" class="banlist-container">
            <p class="empty-msg">No songs blocked yet.</p>
        </div>
    </div>

    <footer>
        <div id="footerBtns">
            <button class="btn footer-btn" id="twitter">
                <a href="https://x.com/buru_army_mil" target="_blank">
                    <img src="./src/icon_twitter.svg" alt="twitter" width="36" height="36">
                </a>
            </button>
            <button class="btn footer-btn" id="github">
                <a href="https://github.com/Dablestar/SongBlocker" target="_blank">
                    <img src="./src/icon_github.svg" alt="github" width="32" height="32">
                </a>
            </button>
        </div>
        <div id="credit"><p><b>DABURU</b></p></div>
    </footer>
    <script src="./js/popup.js"></script>
</body>
</html>
